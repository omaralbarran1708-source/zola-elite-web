services:
  - type: web
    name: zola-elite
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: API_FOOTBALL_KEY
        sync: false
      - key: THE_ODDS_API_KEY
        sync: false
      - key: SPORTMONKS_API_TOKEN
        sync: false
